name: Deploy (Vercel) — manual / optional

# Auto-deploy is handled by VERCEL'S NATIVE GIT INTEGRATION (preview-per-PR +
# prod-on-main on every push) — see docs/deployment_vercel.md. This workflow is
# therefore NOT on push/PR (it would double-deploy and fail without secrets).
# It's kept as an opt-in, run-it-yourself alternative for Actions-driven deploys.
# To use it: add repo secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID,
# then run it from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        type: choice
        options: [preview, production]
        default: preview

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm i -g vercel@latest

      # Fail fast with a clear message if the deploy secrets aren't configured,
      # instead of the cryptic "--token, but it's missing a value" from the CLI.
      - name: Check Vercel secrets
        run: |
          : "${VERCEL_TOKEN:?Missing repo secret VERCEL_TOKEN — add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (or rely on Vercel's native Git integration and don't run this workflow). See docs/deployment_vercel.md}"
          : "${VERCEL_ORG_ID:?Missing repo secret VERCEL_ORG_ID}"
          : "${VERCEL_PROJECT_ID:?Missing repo secret VERCEL_PROJECT_ID}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # ---- Preview (manual: target=preview) ----
      - name: Pull Vercel env (preview)
        if: inputs.target == 'preview'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (preview)
        if: inputs.target == 'preview'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy preview
        if: inputs.target == 'preview'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      # ---- Production (manual: target=production) ----
      - name: Pull Vercel env (production)
        if: inputs.target == 'production'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (production)
        if: inputs.target == 'production'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy production
        if: inputs.target == 'production'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
